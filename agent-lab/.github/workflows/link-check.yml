name: Link Check

on:
  pull_request:
  workflow_dispatch:

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Placeholder link check
        run: |
          echo "Link check placeholder. Add a real link checker later if needed."
          find . -name "*.md" -type f | sort
